<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Umme Shafiqa Clinic — Appointment Requests</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

:root {
  --navy: #1B3A4B;
  --navy-light: #2C5468;
  --cream: #FAF6F0;
  --amber: #D9A24B;
  --rose: #C17767;
  --slate: #24313A;
  --slate-soft: #5B6B72;
  --line: #E4DDD0;
  --new: #C17767;
  --contacted: #D9A24B;
  --done: #6B8F71;
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--slate);
  margin: 0;
  padding: 32px 24px 60px;
}

.admin-header {
  max-width: 1000px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.admin-header img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid var(--amber);
  object-fit: cover;
}

.admin-header h1 {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  color: var(--navy);
  margin: 0;
}

.admin-header .subtitle {
  font-size: 0.85rem;
  color: var(--slate-soft);
  margin: 2px 0 0;
}

.table-wrap {
  max-width: 1000px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(27,58,75,0.06);
}

table { width: 100%; border-collapse: collapse; }

th {
  background: var(--navy);
  color: var(--cream);
  text-align: left;
  padding: 14px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

td {
  padding: 14px 16px;
  border-top: 1px solid var(--line);
  font-size: 0.94rem;
}

tr:hover td { background: #FDFBF8; }

tr.done td { opacity: 0.55; }

.status-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  color: #fff;
  margin-right: 8px;
}

select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--line);
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  background: var(--cream);
}

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--slate-soft);
}
</style>
</head>
<body>

<div class="admin-header">
  <img src="logo.jpeg" alt="Clinic logo">
  <div>
    <h1>Appointment Requests</h1>
    <p class="subtitle">Umme Shafiqa Clinic — staff view</p>
  </div>
</div>

<div class="table-wrap">
  <table id="data-table">
    <tr><th>Name</th><th>Phone</th><th>Preferred Time</th><th>Received</th><th>Status</th></tr>
  </table>
</div>

<script>
const BACKEND = 'https://umme-shafiqa-backend-b8cwevgzcfgya3fe.austriaeast-01.azurewebsites.net';
const STATUS_COLORS = { New: '#C17767', Contacted: '#D9A24B', Done: '#6B8F71' };
let authHeader = null;

function getAuth() {
  if (!authHeader) {
    const user = prompt("Admin username:");
    const pass = prompt("Admin password:");
    authHeader = 'Basic ' + btoa(user + ':' + pass);
  }
  return authHeader;
}

function loadData() {
  fetch(BACKEND + '/inquiries', { headers: { 'Authorization': getAuth() } })
    .then(res => {
      if (res.status === 401) {
        authHeader = null;
        alert('Wrong username or password.');
        throw new Error('unauthorized');
      }
      return res.json();
    })
    .then(data => {
      data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const table = document.getElementById('data-table');
      table.innerHTML = '<tr><th>Name</th><th>Phone</th><th>Preferred Time</th><th>Received</th><th>Status</th></tr>';

      if (data.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="5" class="empty-state">No appointment requests yet.</td>`;
        table.appendChild(tr);
        return;
      }

      data.forEach(row => {
        const tr = document.createElement('tr');
        if (row.status === 'Done') tr.classList.add('done');
        const date = new Date(row.created_at).toLocaleString();
        const color = STATUS_COLORS[row.status] || '#999';
        tr.innerHTML = `
          <td>${row.name}</td>
          <td>${row.phone}</td>
          <td>${row.preferred_time || '—'}</td>
          <td>${date}</td>
          <td>
            <span class="status-pill" style="background:${color}">${row.status}</span>
            <select onchange="updateStatus(${row.id}, this.value)">
              <option value="New" ${row.status === 'New' ? 'selected' : ''}>New</option>
              <option value="Contacted" ${row.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
              <option value="Done" ${row.status === 'Done' ? 'selected' : ''}>Done</option>
            </select>
          </td>`;
        table.appendChild(tr);
      });
    })
    .catch(() => {});
}

function updateStatus(id, newStatus) {
  fetch(`${BACKEND}/inquiries/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json', 'Authorization': getAuth()},
    body: JSON.stringify({status: newStatus})
  }).then(() => loadData());
}

loadData();
</script>
</body>
</html>
